function catCount(id) {
  if (id === "all") return MEDS.length + DEVS.length;
  if (id === "devices") return DEVS.length;
  return MEDS.filter(m => m.category === id).length;
}

function Badge({value}) {
  const n = parseFloat(value);
  if (isNaN(n)) return null;
  return n === 0
    ? <span style={{background:"#059669",color:"#fff",padding:"3px 10px",borderRadius:"20px",fontSize:"11px",fontWeight:700,whiteSpace:"nowrap"}}>БЕЗКОШТОВНО</span>
    : <span style={{background:"#d97706",color:"#fff",padding:"3px 10px",borderRadius:"20px",fontSize:"11px",fontWeight:700,whiteSpace:"nowrap"}}>{n.toFixed(2)} грн</span>;
}

function Detail({label, children}) {
  if (!children) return null;
  return <div style={{marginBottom:"10px"}}>
    <div style={{color:"#94a3b8",fontSize:"10px",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:"2px"}}>{label}</div>
    <div style={{color:"#334155",fontSize:"13px",lineHeight:1.45}}>{children}</div>
  </div>;
}

function MedCard({m, open, toggle, highlight}) {
  const dose = m.dosage_display || m.dosage;
  const catInfo = CATS[m.category] || CATS.other;
  return <div onClick={toggle} style={{
    background: highlight ? "#f0fdf4" : "#fff",
    borderRadius:"16px",padding:"18px 20px",marginBottom:"8px",cursor:"pointer",
    border: open ? "1.5px solid #10b981" : highlight ? "1px solid #a7f3d0" : "1px solid #e2e8f0",
    boxShadow: open ? "0 6px 24px rgba(16,185,129,0.08)" : "0 1px 2px rgba(0,0,0,0.03)",
    transition:"all 0.2s"
  }}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"12px"}}>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"4px",flexWrap:"wrap"}}>
          <span style={{fontSize:"10px",color:"#0d9488",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.8px"}}>{m.inn}</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
          <span style={{fontSize:"17px",fontWeight:800,color:"#0f172a",fontFamily:"'Playfair Display',serif",lineHeight:1.25}}>{m.trade_name}</span>
          {highlight && <span style={{fontSize:"9px",background:"#059669",color:"#fff",padding:"2px 7px",borderRadius:"6px",fontWeight:700,letterSpacing:"0.3px"}}>ПРЯМЕ СПІВПАДІННЯ</span>}
        </div>
        <div style={{fontSize:"13px",color:"#64748b",marginTop:"5px"}}>
          {m.form} <span style={{color:"#cbd5e1"}}>•</span> <strong style={{color:"#334155"}}>{dose}</strong> <span style={{color:"#cbd5e1"}}>•</span> №{m.qty}
        </div>
        <div style={{marginTop:"6px"}}>
          <span style={{fontSize:"9.5px",background: highlight ? "#dcfce7" : "#f0fdf4",color:"#059669",padding:"2px 8px",borderRadius:"6px",fontWeight:600}}>{catInfo.icon} {catInfo.name}</span>
        </div>
      </div>
      <div style={{flexShrink:0,textAlign:"right"}}>
        <Badge value={m.surcharge}/>
        <div style={{fontSize:"9.5px",color:"#94a3b8",fontFamily:"'DM Mono',monospace",marginTop:"5px"}}>{m.atc}</div>
      </div>
    </div>
    {open && <div style={{marginTop:"16px",paddingTop:"14px",borderTop:"1px solid #e2e8f0",animation:"fadeIn .2s ease"}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px 20px"}}>
        <Detail label="Виробник">{m.manufacturer}</Detail>
        <Detail label="Реєстраційне посвідчення">{m.reg_num}</Detail>
        <Detail label="Код АТХ">{m.atc}</Detail>
        <Detail label="Напрям">{catInfo.name}{catInfo.desc ? " — " + catInfo.desc : ""}</Detail>
      </div>
    </div>}

}

    background:"#fff",borderRadius:"16px",padding:"18px 20px",marginBottom:"8px",cursor:"pointer",
    border:open?"1.5px solid #8b5cf6":"1px solid #e2e8f0",
    boxShadow:open?"0 6px 24px rgba(139,92,246,0.08)":"0 1px 2px rgba(0,0,0,0.03)",
    transition:"all 0.2s"
  }}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"12px"}}>
      <div style={{flex:1,minWidth:0}}>
        <span style={{fontSize:"10px",color:"#7c3aed",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.8px"}}>🩺 Медичний виріб</span>
        <div style={{fontSize:"14.5px",fontWeight:700,color:"#0f172a",fontFamily:"'Playfair Display',serif",lineHeight:1.3,marginTop:"4px"}}>
          {d.description.length>100?d.description.slice(0,100)+"…":d.description}
        </div>
      </div>
      <div style={{flexShrink:0}}><Badge value={d.surcharge}/></div>
    </div>
    {open && <div style={{marginTop:"16px",paddingTop:"14px",borderTop:"1px solid #f1f5f9",animation:"fadeIn .2s ease"}}>
      <Detail label="Повний опис">{d.description}</Detail>
      <Detail label="Форма">{d.form}</Detail>
      <Detail label="Класифікація">{d.code}</Detail>
    </div>}
  </div>;
}

function InnBanner({inn, directCount, totalCount}) {
  return <div style={{
    background:"linear-gradient(135deg,#ecfdf5,#d1fae5)",
    border:"1px solid #a7f3d0",
    borderRadius:"14px",
    padding:"14px 18px",
    marginBottom:"10px",
    display:"flex",
    alignItems:"center",
    gap:"12px"
  }}>
    <div style={{fontSize:"28px"}}>💊</div>
    <div>
      <div style={{fontSize:"14px",fontWeight:700,color:"#065f46"}}>
        Знайдено за МНН: {inn}
      </div>
      <div style={{fontSize:"12px",color:"#059669",marginTop:"2px"}}>
        {directCount} прямих співпадінь • {totalCount} всього у цій групі МНН
      </div>
    </div>
  </div>;
}

function App() {
  const [q, setQ] = useState("");
  const [cat, setCat] = useState("all");
  const [free, setFree] = useState(false);
  const [openId, setOpenId] = useState(null);
  const [show, setShow] = useState(50);
  const [catOpen, setCatOpen] = useState(false);

  const norm = s => s.toLowerCase().replace(/[®™«»"'ʼ]/g,"").replace(/\s+/g," ").trim();

  // Smart search: find direct matches, then expand by INN
  const {fMeds, directIds, matchedInn} = useMemo(() => {
    let pool = MEDS;
    if (cat !== "all" && cat !== "devices") pool = pool.filter(m => m.category === cat);
    if (cat === "devices") return {fMeds: [], directIds: new Set(), matchedInn: null};
    if (free) pool = pool.filter(m => m.surcharge === "0.00");

    if (!q.trim()) return {fMeds: pool, directIds: new Set(), matchedInn: null};

    const terms = norm(q).split(" ").filter(Boolean);

    // Step 1: find direct matches (trade name, INN, ATC, manufacturer)
    const directMatches = pool.filter(m => {
      const h = norm([m.inn, m.trade_name, m.atc, m.manufacturer, m.dosage_display||m.dosage].join(" "));
      return terms.every(t => h.includes(t));
    });

    if (directMatches.length === 0) return {fMeds: [], directIds: new Set(), matchedInn: null};

    // Step 2: check if search is primarily a trade name match (not INN)
    const tradeMatches = directMatches.filter(m => {
      const tn = norm(m.trade_name);
      return terms.some(t => tn.includes(t));
    });

    const innMatches = directMatches.filter(m => {
      const inn = norm(m.inn);
      return terms.some(t => inn.includes(t));
    });

    // If user searched by trade name (and NOT by INN directly), expand to full INN group
    // Also check manufacturer and ATC matches
    const mfrMatches = directMatches.filter(m => {
      const mf = norm(m.manufacturer);
      return terms.some(t => mf.includes(t));
    });
    const atcMatches = directMatches.filter(m => {
      const ac = norm(m.atc);
      return terms.some(t => ac.includes(t));
    });

    // Expand ONLY when query matches trade name exclusively (not INN, manufacturer, or ATC)
    const isTradeSearch = tradeMatches.length > 0 && innMatches.length === 0 && mfrMatches.length === 0 && atcMatches.length === 0;

    if (!isTradeSearch) {
      // User searched by INN, ATC or generic term — just return direct matches
      return {fMeds: directMatches, directIds: new Set(), matchedInn: null};
    }

    // Step 3: Expand — collect all INNs from direct matches
    const matchedInns = new Set(tradeMatches.map(m => m.inn));
    const directIdSet = new Set(tradeMatches.map(m => m.inn + "|" + m.trade_name + "|" + m.dosage + "|" + m.qty + "|" + m.reg_num));

    // Get ALL meds from the same pool with matching INN
    let allFromPool = free ? MEDS.filter(m => m.surcharge === "0.00") : MEDS;
    if (cat !== "all" && cat !== "devices") allFromPool = allFromPool.filter(m => m.category === cat);
    
    const expanded = allFromPool.filter(m => matchedInns.has(m.inn));

    // Sort: direct matches first, then rest
    const makeKey = m => m.inn + "|" + m.trade_name + "|" + m.dosage + "|" + m.qty + "|" + m.reg_num;
    expanded.sort((a, b) => {
      const aD = directIdSet.has(makeKey(a)) ? 0 : 1;
      const bD = directIdSet.has(makeKey(b)) ? 0 : 1;
      return aD - bD;
    });

    const innStr = [...matchedInns].join(", ");
    return {fMeds: expanded, directIds: directIdSet, matchedInn: innStr};
  }, [q, cat, free]);

  const fDevs = useMemo(() => {
    if (cat !== "all" && cat !== "devices") return [];
    let r = DEVS;
    if (free) r = r.filter(d => d.surcharge === "0.00");
    if (q) {
      const terms = norm(q).split(" ").filter(Boolean);
      r = r.filter(d => {
        const h = norm([d.description, d.form, d.name].join(" "));
        return terms.every(t => h.includes(t));
      });
    }
    return r;
  }, [q, cat, free]);

  const total = fMeds.length + fDevs.length;
  const showing = fMeds.slice(0, show);
  const activeCat = CATS[cat];
  const directCount = directIds.size;
  const makeKey = m => m.inn + "|" + m.trade_name + "|" + m.dosage + "|" + m.qty + "|" + m.reg_num;

  return <div style={{minHeight:"100vh",background:"#f8fafc",fontFamily:"'DM Sans',sans-serif"}}>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <style>{`@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}input::placeholder{color:#94a3b8}*{box-sizing:border-box}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}`}</style>

    {/* Header */}
    <div style={{background:"linear-gradient(135deg,#064e3b 0%,#047857 50%,#059669 100%)",padding:"36px 20px 56px",textAlign:"center",position:"relative"}}>
      <div style={{position:"absolute",inset:0,opacity:0.06,backgroundImage:"radial-gradient(circle at 1px 1px, white 1px, transparent 0)",backgroundSize:"24px 24px"}}/>
      <div style={{position:"relative",zIndex:1}}>
        <div style={{display:"inline-block",background:"rgba(255,255,255,0.12)",borderRadius:"8px",padding:"4px 14px",fontSize:"10.5px",fontWeight:700,color:"rgba(255,255,255,0.85)",letterSpacing:"2.5px",textTransform:"uppercase",marginBottom:"12px"}}>Програма реімбурсації</div>
        <h1 style={{fontSize:"34px",fontWeight:900,color:"#fff",fontFamily:"'Playfair Display',serif",margin:"0 0 6px",lineHeight:1.1}}>«Доступні ліки»</h1>
        <div style={{fontSize:"13.5px",color:"rgba(255,255,255,0.65)",fontWeight:500}}>Повний перелік • березень 2026</div>
        <div style={{display:"flex",justifyContent:"center",gap:"20px",marginTop:"18px",flexWrap:"wrap"}}>
          {[
            [MEDS.length+DEVS.length,"позицій"],
            [MEDS.filter(m=>m.surcharge==="0.00").length+DEVS.filter(d=>d.surcharge==="0.00").length,"безкоштовних"],
            [new Set(MEDS.map(m=>m.inn)).size,"МНН"],
            [Object.keys(CATS).length-2,"напрямів"]
          ].map(([v,l],i) => <div key={i} style={{textAlign:"center",minWidth:"60px"}}>
            <div style={{fontSize:"22px",fontWeight:800,color:"#fff",fontFamily:"'DM Mono',monospace"}}>{v}</div>
            <div style={{fontSize:"10px",color:"rgba(255,255,255,0.55)",fontWeight:600}}>{l}</div>
          </div>)}
        </div>
      </div>
    </div>

    {/* Search */}
    <div style={{maxWidth:"720px",margin:"-28px auto 0",padding:"0 16px",position:"relative",zIndex:2}}>
      <div style={{background:"#fff",borderRadius:"18px",padding:"5px 5px 5px 18px",boxShadow:"0 8px 32px rgba(0,0,0,0.08)",display:"flex",alignItems:"center"}}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="2.5" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input value={q} onChange={e=>{setQ(e.target.value);setShow(50);setOpenId(null)}}
          placeholder="Назва ліків, МНН, код АТХ, виробник..."
          style={{flex:1,border:"none",outline:"none",fontSize:"15px",padding:"13px 10px",background:"transparent",color:"#0f172a"}}/>
        {q && <button onClick={()=>{setQ("");setShow(50)}} style={{background:"#f1f5f9",border:"none",borderRadius:"10px",padding:"8px 14px",cursor:"pointer",fontSize:"13px",color:"#64748b",fontWeight:600}}>✕</button>}
      </div>
    </div>

    {/* Category dropdown */}
    <div style={{maxWidth:"720px",margin:"14px auto 0",padding:"0 16px"}}>
      <button onClick={()=>setCatOpen(!catOpen)} style={{
        width:"100%",background:"#fff",border:"1px solid #e2e8f0",borderRadius:"14px",padding:"12px 18px",
        cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",
        boxShadow:"0 1px 3px rgba(0,0,0,0.03)"
      }}>
        <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
          <span style={{fontSize:"20px"}}>{activeCat.icon}</span>
          <div style={{textAlign:"left"}}>
            <div style={{fontSize:"14px",fontWeight:700,color:"#0f172a"}}>{activeCat.name}</div>
            {activeCat.desc && <div style={{fontSize:"11.5px",color:"#94a3b8",marginTop:"1px"}}>{activeCat.desc}</div>}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
          <span style={{fontSize:"12px",fontWeight:600,color:"#059669",background:"#ecfdf5",padding:"3px 10px",borderRadius:"8px"}}>{catCount(cat)}</span>
          <span style={{color:"#94a3b8",fontSize:"18px",transform:catOpen?"rotate(180deg)":"",transition:"transform 0.2s"}}>▾</span>
        </div>
      </button>

      {catOpen && <div style={{
        background:"#fff",border:"1px solid #e2e8f0",borderRadius:"14px",marginTop:"6px",
        boxShadow:"0 8px 30px rgba(0,0,0,0.08)",overflow:"hidden",animation:"fadeIn .15s ease",
        maxHeight:"420px",overflowY:"auto"
      }}>
        {CAT_ORDER.map(id => {
          const c = CATS[id];
          const cnt = catCount(id);
          const active = cat === id;
          return <div key={id} onClick={()=>{setCat(id);setCatOpen(false);setShow(50);setOpenId(null)}} style={{
            padding:"11px 18px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",
            background:active?"#f0fdf4":"transparent",borderLeft:active?"3px solid #059669":"3px solid transparent"
          }}>
            <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
              <span style={{fontSize:"17px",width:"24px",textAlign:"center"}}>{c.icon}</span>
              <div>
                <div style={{fontSize:"13px",fontWeight:active?700:500,color:active?"#059669":"#334155"}}>{c.name}</div>
                {c.desc && <div style={{fontSize:"10.5px",color:"#94a3b8"}}>{c.desc}</div>}
              </div>
            </div>
            <span style={{fontSize:"11px",fontWeight:600,color:active?"#059669":"#94a3b8",background:active?"#dcfce7":"#f8fafc",padding:"2px 9px",borderRadius:"8px"}}>{cnt}</span>
          </div>;
        })}
      </div>}
    </div>

    {/* Filters */}
    <div style={{maxWidth:"720px",margin:"12px auto 0",padding:"0 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{fontSize:"13px",color:"#64748b"}}>
        {(q || free || cat!=="all") ? <>Знайдено: <strong style={{color:"#0f172a"}}>{total}</strong></> : "Всі позиції"}
      </div>
      <label style={{display:"flex",alignItems:"center",gap:"8px",cursor:"pointer",fontSize:"12.5px",color:free?"#059669":"#64748b",fontWeight:600,userSelect:"none"}}>
        <div onClick={()=>{setFree(!free);setShow(50)}} style={{
          width:"40px",height:"22px",borderRadius:"11px",background:free?"#059669":"#cbd5e1",position:"relative",transition:"background 0.2s",cursor:"pointer"
        }}>
          <div style={{width:"18px",height:"18px",borderRadius:"50%",background:"#fff",position:"absolute",top:"2px",left:free?"20px":"2px",transition:"left 0.2s",boxShadow:"0 1px 3px rgba(0,0,0,0.15)"}}/>
        </div>
        Безкоштовні
      </label>
    </div>

    {/* Results */}
    <div style={{maxWidth:"720px",margin:"10px auto 0",padding:"0 16px 60px"}}>
      {matchedInn && directCount > 0 && (
        <InnBanner inn={matchedInn} directCount={directCount} totalCount={fMeds.length}/>
      )}

      {showing.map((m,i) => {
        const isDirect = directIds.size > 0 && directIds.has(makeKey(m));
        return <MedCard key={"m"+i} m={m} open={openId==="m"+i} toggle={()=>setOpenId(openId==="m"+i?null:"m"+i)} highlight={isDirect}/>;
      })}

      {fDevs.map((d,i) => <DevCard key={"d"+i} d={d} open={openId==="d"+i} toggle={()=>setOpenId(openId==="d"+i?null:"d"+i)}/>)}

      {fMeds.length > show && <button onClick={()=>setShow(s=>s+50)} style={{
        width:"100%",padding:"14px",background:"#fff",border:"1.5px solid #e2e8f0",borderRadius:"16px",
        fontSize:"13.5px",fontWeight:700,color:"#059669",cursor:"pointer",marginTop:"6px"
      }}>Показати ще ↓ <span style={{color:"#94a3b8",fontWeight:500}}>({fMeds.length-show} залишилось)</span></button>}

      {total===0 && <div style={{textAlign:"center",padding:"50px 20px"}}>
        <div style={{fontSize:"48px",marginBottom:"14px"}}>🔍</div>
        <div style={{fontSize:"16px",fontWeight:700,color:"#334155",fontFamily:"'Playfair Display',serif",marginBottom:"6px"}}>Нічого не знайдено</div>
        <div style={{fontSize:"13.5px",color:"#94a3b8"}}>Спробуйте іншу назву або оберіть інший напрям</div>
      </div>}
    </div>
  </div>;
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
